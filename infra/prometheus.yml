global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project: billflow

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'billflow-gateway'
    static_configs:
      - targets: ['host.docker.internal:5100']
    metrics_path: '/metrics'

  - job_name: 'billflow-invoice'
    static_configs:
      - targets: ['host.docker.internal:5000']
    metrics_path: '/metrics'

  - job_name: 'billflow-tenant'
    static_configs:
      - targets: ['host.docker.internal:5001']
    metrics_path: '/metrics'

  - job_name: 'billflow-identity'
    static_configs:
      - targets: ['host.docker.internal:5002']
    metrics_path: '/metrics'

  - job_name: 'billflow-customer'
    static_configs:
      - targets: ['host.docker.internal:5003']
    metrics_path: '/metrics'

  - job_name: 'billflow-notification'
    static_configs:
      - targets: ['host.docker.internal:5004']
    metrics_path: '/metrics'