networks:
  billflow-network:
    external: true

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: billflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "BillFlow@1234"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - billflow-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: billflow-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: billflow
      RABBITMQ_DEFAULT_PASS: "billflow123"
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped
    networks:
      - billflow-network

  seq:
    image: datalust/seq:latest
    container_name: billflow-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "StrongPassword123"
    ports:
      - "5341:80"
    volumes:
      - billflow-seq-data:/data
    restart: unless-stopped
    networks:
      - billflow-network

  prometheus:
    image: prom/prometheus:latest
    container_name: billflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    networks:
      - billflow-network

  grafana:
    image: grafana/grafana:latest
    container_name: billflow-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "BillFlow@1234"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: "/var/lib/grafana/dashboards/overview.json"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped
    networks:
      - billflow-network

volumes:
  sqlserver-data:
  billflow-seq-data:
  prometheus-data:
  grafana-data: